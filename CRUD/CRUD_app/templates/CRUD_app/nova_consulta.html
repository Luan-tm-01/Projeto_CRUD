{% extends "CRUD_app/cabecalho.html" %}

{% block content %}
<div class="container">

   <div class="card-form">

      <h2 class="titulo">Adicionar uma Nova Consulta</h2>

         <form action="{% url 'nova_consulta' %}" method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn-salvar" name="submit">Adicionar</button>
         </form>

   </div>

</div>

{% endblock content %}
