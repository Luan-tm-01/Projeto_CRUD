{% extends "CRUD_app/cabecalho.html" %}

{% block content %}
   
    <p><strong>{{ medico.nome_completo }}</strong></p>
    
    <p>Editar Informações do Médico:</p>

    <form action="{% url 'edit_medico' medico.id %}" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button name="submit" onclick="return confirm('Tem certeza que deseja editar as informações deste médico?')">Salvar</button>
    </form>

{% endblock content %}
